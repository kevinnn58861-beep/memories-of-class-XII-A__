    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg: #02040a;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0c152e 0%, #02040a 100%);
            z-index: -1;
        }

        /* Layar Pembuka Luxury */
        #pintu-masuk {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .intro-content { text-align: center; }
        .intro-content h1 { 
            font-family: 'Space Grotesk', sans-serif; font-size: 5rem; 
            letter-spacing: 15px; margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 30%, #444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-masuk {
            padding: 20px 60px; background: none; border: 1px solid var(--border);
            color: #fff; border-radius: 100px; cursor: pointer;
            letter-spacing: 5px; font-size: 0.8rem; transition: 0.5s;
        }
        .btn-masuk:hover { background: #fff; color: #000; box-shadow: 0 0 50px rgba(255,255,255,0.2); }

        /* Navigation */
        .hero { padding: 100px 20px 40px; text-align: center; }
        .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; font-weight: 700; margin-bottom: 10px; }
        .hero p { color: var(--accent); letter-spacing: 8px; font-size: 0.7rem; font-weight: 800; }

        .audio-container {
            max-width: 400px; margin: 30px auto; background: var(--glass);
            border: 1px solid var(--border); padding: 15px; border-radius: 20px;
            backdrop-filter: blur(20px);
        }
        audio { width: 100%; height: 30px; filter: invert(1); opacity: 0.5; }

        .nav-tabs { 
            display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; 
            position: sticky; top: 20px; z-index: 100;
        }
        .tab-link {
            padding: 15px 35px; background: rgba(10, 10, 10, 0.8); border: 1px solid var(--border);
            color: #666; border-radius: 100px; cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(10px); font-weight: bold; font-size: 0.8rem;
        }
        .tab-link.active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px rgba(0,210,255,0.2); }

        /* Grid Design */
        .content-section { max-width: 1300px; margin: 0 auto; padding: 0 20px 100px; display: none; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; 
        }
        .item { 
            background: var(--glass); border-radius: 12px; overflow: hidden; 
            aspect-ratio: 1/1; border: 1px solid var(--border);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .item:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        img, video { width: 100%; height: 100%; object-fit: cover; }

        footer { text-align: center; padding: 100px 20px; opacity: 0.2; font-size: 0.7rem; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .intro-content h1 { font-size: 2.5rem; letter-spacing: 8px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>

    <script>
        function init() {
            const intro = document.getElementById('pintu-masuk');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                openTab('foto');
            }, 1000);
            document.getElementById('player').play();
        }

        function openTab(tabName) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
            
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('t-' + tabName).classList.add('active');
        }
    </script>
